<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Slider</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    .hero {
      position: relative;
      width: 100%;
      height: 85vh;
      overflow: hidden;
      background: #0f172a;
    }

    /* Track holds all slides side by side */
    .slides-track {
      display: flex;
      height: 100%;
      transition: transform 0.8s ease;
    }

    /* Each slide */
    .slide {
      min-width: 100%;
      height: 100%;
      position: relative;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    /* Text overlay */
    .slide-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: #fff;
    }

    .slide-content h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .slide-content p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: #cbd5e1;
      margin-bottom: 2rem;
    }

    .slide-content .btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .slide-content .btn:hover { opacity: 0.85; }

    /* Prev / Next buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: rgba(255, 255, 255, 0.25); }
    .nav-btn.prev { left: 1.5rem; }
    .nav-btn.next { right: 1.5rem; }

    @media (max-width: 640px) {
      .nav-btn { display: none; }
    }

    /* Dot indicators */
    .dots {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot.active {
      width: 28px;
      border-radius: 4px;
      background: #3b82f6;
    }
  </style>
</head>
<body>

<div class="hero">

  <div class="slides-track" id="slidesTrack">

    <!-- Slide 1 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1515187029135-18ee286d815b?q=80&w=1600" alt="Networking">
      <div class="slide-content">
        <h1>Expand your <span style="color:#60a5fa">network</span></h1>
        <p>The heartbeat of the global tech community.</p>
        <a href="#" class="btn" style="background:#2563eb;color:#fff">Join TechHoodNet</a>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=1600" alt="Collaboration">
      <div class="slide-content">
        <h1>Build the <span style="color:#34d399">future</span></h1>
        <p>Find your next project partner today.</p>
        <a href="#" class="btn" style="background:#059669;color:#fff">Start collaborating</a>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1600" alt="Tech workspace">
      <div class="slide-content">
        <h1>Level up your <span style="color:#a78bfa">career</span></h1>
        <p>Mentors, hackathons, and real opportunities.</p>
        <a href="#" class="btn" style="background:#7c3aed;color:#fff">Get started free</a>
      </div>
    </div>

  </div>

  <!-- Navigation arrows -->
  <button class="nav-btn prev" onclick="move(-1)">&#8592;</button>
  <button class="nav-btn next" onclick="move(1)">&#8594;</button>

  <!-- Dot indicators -->
  <div class="dots" id="dots"></div>

</div>

<script>
  const track = document.getElementById('slidesTrack');
  const dotsContainer = document.getElementById('dots');
  const slides = track.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;
  let autoTimer;

  // Build dots dynamically
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  function updateSlider() {
    track.style.transform = `translateX(-${current * 100}%)`;
    dotsContainer.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  function move(dir) {
    current = (current + dir + total) % total;
    updateSlider();
    resetTimer();
  }

  function goTo(index) {
    current = index;
    updateSlider();
    resetTimer();
  }

  function resetTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => move(1), 5000);
  }

  // Start autoplay
  autoTimer = setInterval(() => move(1), 5000);

  // Optional: swipe support on mobile
  let touchStartX = 0;
  track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  track.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) move(diff > 0 ? 1 : -1);
  });
</script>

</body>
</html>
