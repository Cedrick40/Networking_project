{% load static %}
<header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-purple-500/20 dark:border-purple-500/10 shadow-xl">
    <div class="container mx-auto px-4">
        
        <!-- Top Row: Logo + Search + Actions -->
        <div class="flex items-center justify-between gap-2 py-2 md:py-3">
            
            <!-- Logo with Brand Name -->
            <a href="{% url 'core:home' %}" class="flex items-center space-x-2 flex-shrink-0 group">
                <img src="{% static 'images/logo/techhoodnet-logo.png' %}" 
                     alt="TechHoodNet"
                     class="h-8 w-8 md:h-10 md:w-10 object-contain transition-transform duration-300 group-hover:scale-110">
                <div class="flex flex-col">
                    <span class="text-sm md:text-lg font-bold bg-gradient-to-r from-teal-400 via-purple-500 to-purple-600 bg-clip-text text-transparent">
                        TechHoodNet
                    </span>
                    <span class="text-[8px] text-gray-500 dark:text-gray-400 hidden sm:block">connect · collaborate · grow</span>
                </div>
            </a>
            
            <!-- Search Bar - Desktop Only -->
            <div class="hidden md:block flex-1 max-w-xl mx-6 relative">
                <form action="{% url 'core:search' %}" method="get" class="relative">
                    <input type="text" 
                           name="q" 
                           id="searchInput"
                           placeholder="🔍 Search members, projects, jobs... (Ctrl+K)" 
                           class="w-full pl-10 pr-24 py-2 text-sm rounded-full border-0 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <button type="submit" class="absolute right-1.5 top-1/2 transform -translate-y-1/2 px-4 py-1 text-xs font-medium text-white bg-gradient-to-r from-purple-500 to-purple-600 rounded-full">
                        Search
                    </button>
                </form>
                <div id="searchSuggestions" class="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 hidden z-50 max-h-80 overflow-y-auto"></div>
            </div>
            
            <!-- Actions -->
            <div class="flex items-center gap-1 md:gap-2 flex-shrink-0">
                
                <!-- Mobile Search Button -->
                <button id="mobileSearchBtn" class="md:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
                
                <!-- Theme Dropdown -->
                <div class="relative">
                    <button id="themeDropdownBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <div id="themeDropdownMenu" class="absolute right-0 mt-2 w-32 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 hidden z-50">
                        <button onclick="setTheme('light')" class="w-full text-left px-3 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">🌞 Light</button>
                        <button onclick="setTheme('dark')" class="w-full text-left px-3 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">🌙 Dark</button>
                        <button onclick="setTheme('system')" class="w-full text-left px-3 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-b-lg">💻 System</button>
                    </div>
                </div>
                
                <!-- User Section -->
                {% if user.is_authenticated %}
                    <!-- User Avatar Dropdown -->
                    <div class="relative">
                        <button id="userDropdownBtn" class="flex items-center gap-1 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" alt="{{ user.username }}" class="w-7 h-7 md:w-8 md:h-8 rounded-full object-cover border border-purple-500">
                            {% else %}
                                <div class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-gradient-to-r from-purple-500 to-purple-600 flex items-center justify-center text-white font-semibold text-sm">
                                    {{ user.username|make_list|first|upper }}
                                </div>
                            {% endif %}
                            <span class="hidden sm:block text-sm font-medium text-gray-700 dark:text-gray-300">{{ user.username }}</span>
                        </button>
                        
                        <div id="userDropdownMenu" class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 hidden z-50">
                            <a href="/profile/" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">Profile</a>
                            <a href="/dashboard/" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
                            <a href="/settings/" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">Settings</a>
                            <hr class="my-1 border-gray-200 dark:border-gray-700">
                            <a href="{% url 'accounts:logout' %}" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-b-lg">Sign Out</a>
                        </div>
                    </div>
                {% else %}
                    <!-- Auth Buttons -->
                    <a href="{% url 'accounts:login' %}" class="hidden sm:block px-3 py-1 text-sm font-medium text-purple-600 dark:text-purple-400 hover:text-purple-700">
                        Sign in
                    </a>
                    <a href="{% url 'accounts:signup' %}" class="hidden sm:block px-3 py-1 text-sm font-medium bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-full hover:shadow-md">
                        Sign up
                    </a>
                {% endif %}
                
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center gap-1 py-2 overflow-x-auto whitespace-nowrap scrollbar-hide">
            <a href="{% url 'core:home' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path == '/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Home</a>
            <a href="{% url 'members:list' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':9' == '/members/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Members</a>
            <a href="{% url 'projects:list' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':10' == '/projects/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Projects</a>
            <a href="{% url 'core:services' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':10' == '/services/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Services</a>
            <a href="{% url 'events:list' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':8' == '/events/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Events</a>
            <a href="{% url 'jobs:list' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':6' == '/jobs/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Jobs</a>
            <a href="{% url 'core:about' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':7' == '/about/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">About</a>
            <a href="{% url 'core:contact' %}" class="px-3 py-1 text-sm font-medium rounded-full transition-all duration-200 {% if request.path|slice:':9' == '/contact/' %}bg-purple-500/20 text-purple-600 dark:text-purple-400{% else %}text-gray-700 dark:text-gray-200 hover:text-purple-600 dark:hover:text-purple-400 hover:bg-purple-50/50 dark:hover:bg-purple-900/20{% endif %}">Contact</a>
        </nav>
    </div>
</header>

<!-- Mobile Search Modal -->
<div id="mobileSearchModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden">
    <div class="absolute top-0 left-0 right-0 bg-white dark:bg-gray-900 p-4 shadow-lg">
        <form action="{% url 'core:search' %}" method="get" class="flex items-center gap-2">
            <input type="text" 
                   name="q" 
                   id="mobileSearchInput"
                   placeholder="Search members, projects, jobs..." 
                   class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                   autofocus>
            <button type="submit" class="p-3 bg-purple-500 text-white rounded-xl hover:bg-purple-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
            <button type="button" id="closeMobileSearch" class="p-3 text-gray-500 hover:text-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </form>
    </div>
</div>

<!-- Mobile Menu - COMPLETELY REWRITTEN FOR RELIABILITY -->
<div id="mobileMenu" style="display: none;" class="fixed inset-x-0 top-[56px] bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-xl z-40 overflow-y-auto max-h-[calc(100vh-56px)]">
    <div class="py-4 px-4">
        <nav class="flex flex-col space-y-1">
            <a href="{% url 'core:home' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Home</a>
            <a href="{% url 'members:list' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Members</a>
            <a href="{% url 'projects:list' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Projects</a>
            <a href="{% url 'core:services' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Services</a>
            <a href="{% url 'events:list' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Events</a>
            <a href="{% url 'jobs:list' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Jobs</a>
            <a href="{% url 'core:about' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">About</a>
            <a href="{% url 'core:contact' %}" class="block py-3 px-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-purple-600 transition-all">Contact</a>
        </nav>
        
        <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 flex gap-3">
            <a href="{% url 'accounts:login' %}" class="flex-1 text-center py-3 text-purple-600 font-medium text-base border border-purple-500 rounded-lg hover:bg-purple-50 transition-all">Sign in</a>
            <a href="{% url 'accounts:signup' %}" class="flex-1 text-center py-3 bg-gradient-to-r from-purple-500 to-purple-600 text-white font-medium text-base rounded-lg hover:shadow-md transition-all">Sign up</a>
        </div>
    </div>
</div>

<script>
// Theme Dropdown
const themeBtn = document.getElementById('themeDropdownBtn');
const themeMenu = document.getElementById('themeDropdownMenu');

if (themeBtn && themeMenu) {
    themeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        themeMenu.classList.toggle('hidden');
    });
}

// User Dropdown
const userBtn = document.getElementById('userDropdownBtn');
const userMenu = document.getElementById('userDropdownMenu');

if (userBtn && userMenu) {
    userBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userMenu.classList.toggle('hidden');
    });
}

// ========== MOBILE MENU - SIMPLE AND RELIABLE ==========
const mobileBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');

if (mobileBtn && mobileMenu) {
    // Toggle menu when hamburger is clicked
    mobileBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        if (mobileMenu.style.display === 'none' || mobileMenu.style.display === '') {
            mobileMenu.style.display = 'block';
            // Prevent body scroll when menu is open
            document.body.style.overflow = 'hidden';
        } else {
            mobileMenu.style.display = 'none';
            document.body.style.overflow = '';
        }
    });
    
    // Close menu when clicking on any link inside the menu
    const menuLinks = mobileMenu.querySelectorAll('a');
    menuLinks.forEach(link => {
        link.addEventListener('click', function() {
            mobileMenu.style.display = 'none';
            document.body.style.overflow = '';
        });
    });
}

// Close mobile menu when clicking outside (optional)
document.addEventListener('click', function(e) {
    if (mobileMenu && mobileBtn) {
        if (mobileMenu.style.display === 'block' && 
            !mobileMenu.contains(e.target) && 
            !mobileBtn.contains(e.target)) {
            mobileMenu.style.display = 'none';
            document.body.style.overflow = '';
        }
    }
});

// Mobile Search Modal
const mobileSearchBtn = document.getElementById('mobileSearchBtn');
const mobileSearchModal = document.getElementById('mobileSearchModal');
const closeMobileSearch = document.getElementById('closeMobileSearch');

if (mobileSearchBtn && mobileSearchModal) {
    mobileSearchBtn.addEventListener('click', () => {
        mobileSearchModal.classList.remove('hidden');
        setTimeout(() => {
            const input = document.getElementById('mobileSearchInput');
            if (input) input.focus();
        }, 100);
    });
}

if (closeMobileSearch && mobileSearchModal) {
    closeMobileSearch.addEventListener('click', () => {
        mobileSearchModal.classList.add('hidden');
    });
    
    mobileSearchModal.addEventListener('click', (e) => {
        if (e.target === mobileSearchModal) {
            mobileSearchModal.classList.add('hidden');
        }
    });
}

// Close dropdowns when clicking outside
document.addEventListener('click', function() {
    if (themeMenu) themeMenu.classList.add('hidden');
    if (userMenu) userMenu.classList.add('hidden');
});

// Prevent closing when clicking inside dropdowns
if (themeMenu) {
    themeMenu.addEventListener('click', (e) => e.stopPropagation());
}
if (userMenu) {
    userMenu.addEventListener('click', (e) => e.stopPropagation());
}

// Theme function
function setTheme(theme) {
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    } else if (theme === 'light') {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
    } else if (theme === 'system') {
        localStorage.setItem('theme', 'system');
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    }
    if (themeMenu) themeMenu.classList.add('hidden');
}

// Load saved theme
(function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
    } else if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
    } else if (savedTheme === 'system') {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    } else {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    }
})();

// Desktop search suggestions
const searchInput = document.getElementById('searchInput');
const suggestionsContainer = document.getElementById('searchSuggestions');
let suggestionTimeout;

if (searchInput && suggestionsContainer) {
    searchInput.addEventListener('input', function() {
        clearTimeout(suggestionTimeout);
        const query = this.value.trim();
        
        if (query.length < 2) {
            suggestionsContainer.classList.add('hidden');
            return;
        }
        
        suggestionTimeout = setTimeout(() => {
            const mockSuggestions = [
                { name: query + ' developers', type: 'members', url: '/members/?q=' + encodeURIComponent(query) },
                { name: query + ' projects', type: 'projects', url: '/projects/?q=' + encodeURIComponent(query) },
                { name: query + ' jobs', type: 'jobs', url: '/jobs/?q=' + encodeURIComponent(query) },
            ];
            
            suggestionsContainer.innerHTML = mockSuggestions.map(item => `
                <a href="${item.url}" class="flex items-center gap-2 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors border-b border-gray-100 dark:border-gray-700 last:border-0">
                    <div class="w-6 h-6 rounded-full bg-gradient-to-r from-purple-500 to-purple-600 flex items-center justify-center text-white text-xs">
                        ${item.type === 'members' ? '👥' : item.type === 'projects' ? '📁' : '💼'}
                    </div>
                    <div>
                        <div class="text-sm font-medium text-gray-900 dark:text-white">${item.name}</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 capitalize">${item.type}</div>
                    </div>
                </a>
            `).join('');
            suggestionsContainer.classList.remove('hidden');
        }, 300);
    });
    
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !suggestionsContainer.contains(e.target)) {
            suggestionsContainer.classList.add('hidden');
        }
    });
}

// Keyboard shortcut
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (searchInput) {
            searchInput.focus();
            searchInput.select();
        }
    }
});
</script>

<style>
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    #mobileSearchModal.hidden {
        display: none;
    }
    .container {
        width: 100%;
        max-width: 100%;
    }
    body {
        overflow-x: hidden;
    }
</style>
