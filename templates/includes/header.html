<div class="relative group">
    <button class="flex items-center gap-2 px-3 py-2 rounded-full hover:bg-white/20 dark:hover:bg-gray-800/50 transition-all duration-200">
        <svg class="w-4 h-4 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
        <span id="currentThemeLabel" class="text-sm font-medium text-gray-700 dark:text-gray-300">Theme</span>
        <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
    </button>
    
    <div class="absolute right-0 mt-2 w-36 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 hidden group-hover:block z-50">
        <button onclick="setTheme('light')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg">
            🌞 Light
        </button>
        <button onclick="setTheme('dark')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700">
            🌙 Dark
        </button>
        <button onclick="setTheme('system')" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-b-lg">
            💻 System
        </button>
    </div>
</div>

<script>
function setTheme(theme) {
    const currentLabel = document.getElementById('currentThemeLabel');
    
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        if (currentLabel) currentLabel.textContent = 'Dark';
    } else if (theme === 'light') {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        if (currentLabel) currentLabel.textContent = 'Light';
    } else if (theme === 'system') {
        localStorage.setItem('theme', 'system');
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            if (currentLabel) currentLabel.textContent = 'System';
        } else {
            document.documentElement.classList.remove('dark');
            if (currentLabel) currentLabel.textContent = 'System';
        }
    }
}

// Load saved theme on page load
(function() {
    const savedTheme = localStorage.getItem('theme');
    const currentLabel = document.getElementById('currentThemeLabel');
    
    if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
        if (currentLabel) currentLabel.textContent = 'Dark';
    } else if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
        if (currentLabel) currentLabel.textContent = 'Light';
    } else if (savedTheme === 'system') {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        if (currentLabel) currentLabel.textContent = 'System';
    } else {
        // No saved preference, use system
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        if (currentLabel) currentLabel.textContent = 'System';
    }
})();
</script>
