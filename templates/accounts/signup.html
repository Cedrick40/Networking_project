{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-16 max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Sign Up</h1>
    <form method="post" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full mt-4 px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg hover:shadow-lg">
            Sign Up
        </button>
    </form>
    <p class="text-center mt-4">
        Already have an account? <a href="/accounts/login/" class="text-blue-600">Log in</a>
    </p>
</div>
{% endblock %}
